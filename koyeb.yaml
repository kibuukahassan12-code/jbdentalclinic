services:
  - name: jb-dental-clinic
    type: web
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
    healthcheck:
      path: /api/health
      port: 8000
    env:
      - name: DATABASE_PATH
        value: /app/data/appointments.db
    build:
      command: npm ci && npm run build
    run:
      command: npm start
    volumes:
      - id: jb-dental-db
        path: /app/data
