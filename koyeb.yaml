services:
  - name: jb-dental-clinic
    type: web
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
    healthcheck:
      path: /health
      port: 8000
    build:
      command: npm ci && npm run build
    run:
      command: npm start
    volumes:
      - id: jb-dental-db
        path: /app/data
